<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntentFlow — Chat Demo</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --accent: #38bdf8;
      --accent-dark: #0284c7;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --user: #2563eb;
      --bot: #334155;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
    }
    header h1 {
      margin: 0;
      font-size: 32px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { margin: 4px 0; color: var(--muted); font-size: 14px; }
    .shell {
      width: 100%;
      max-width: 720px;
      background: var(--panel);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 75vh;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: pop 0.2s ease-out;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: var(--bot); border-bottom-left-radius: 4px; }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-family: "SF Mono", Menlo, monospace;
    }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 14px;
      background: #0f172a;
      border-top: 1px solid #334155;
    }
    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-dark); color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 12px 0 4px;
      max-width: 720px;
    }
    .chip {
      padding: 6px 12px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 999px;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chip:hover { background: rgba(56, 189, 248, 0.2); }
    footer { margin-top: 12px; color: var(--muted); font-size: 12px; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>IntentFlow</h1>
    <p>Intent-driven tool routing · FastAPI · Zero LLM cost</p>
  </header>

  <div class="chips">
    <div class="chip" data-msg="what is 25 * 40">what is 25 * 40</div>
    <div class="chip" data-msg="what time is it">what time is it</div>
    <div class="chip" data-msg="say hi to Jacob">say hi to Jacob</div>
    <div class="chip" data-msg="reverse IntentFlow">reverse IntentFlow</div>
    <div class="chip" data-msg="count words in the quick brown fox">count words in the quick brown fox</div>
    <div class="chip" data-msg="what can you do">what can you do</div>
  </div>

  <div class="shell">
    <div class="messages" id="messages"></div>
    <form class="input-row" id="form">
      <input id="input" placeholder="Ask me something... (try the chips above)" autofocus autocomplete="off" />
      <button type="submit" id="send">Send</button>
    </form>
  </div>

  <footer>
    Try the raw API at <a href="/docs" target="_blank">/docs</a> ·
    See intents at <a href="/intents" target="_blank">/intents</a> ·
    See tools at <a href="/tools" target="_blank">/tools</a>
  </footer>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(text, who, meta) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      div.textContent = text;
      if (meta) {
        const metaEl = document.createElement("div");
        metaEl.className = "meta";
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send(message) {
      addMessage(message, "user");
      input.value = "";
      sendBtn.disabled = true;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        const meta = data.intent
          ? `intent: ${data.intent} · tool: ${data.tool}${
              Object.keys(data.args || {}).length
                ? " · args: " + JSON.stringify(data.args)
                : ""
            }`
          : "no intent matched";
        addMessage(data.reply, "bot", meta);
      } catch (err) {
        addMessage("Network error: " + err.message, "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (msg) send(msg);
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => send(chip.dataset.msg));
    });

    // Warm greeting
    addMessage(
      "Hi! I'm IntentFlow. I route what you say to the right Python tool — no LLM, no cost, no magic.\nTap a suggestion above or type your own.",
      "bot"
    );
  </script>
</body>
</html>
